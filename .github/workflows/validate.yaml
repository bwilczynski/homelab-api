name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Bundle spec
        run: make -C spec bundle

      - name: Generate server stubs
        run: make generate

      - name: Build
        run: make build

      - name: Test
        run: make test

  contract-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Bundle spec
        run: make -C spec bundle

      - name: Generate server stubs
        run: make generate

      - name: Build test server
        run: go build -o bin/testserver ./cmd/testserver

      - name: Start test server
        run: |
          ./bin/testserver &
          for i in $(seq 1 10); do
            curl -sf http://localhost:8081/system/health >/dev/null && break
            sleep 1
          done

      - name: Contract tests
        uses: schemathesis/action@v3
        with:
          schema: spec/dist/openapi.bundled.yaml
          base-url: http://localhost:8081
          checks: all
