name: Validate

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Bundle spec
        run: make -C spec bundle

      - name: Generate server stubs
        run: make generate

      - name: Build
        run: make build

      - name: Test
        run: make test

  contract-test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Bundle spec
        run: make -C spec bundle

      - name: Generate server stubs
        run: make generate

      - name: Build test server
        run: go build -o bin/testserver ./cmd/testserver

      - name: Start test server
        run: |
          ./bin/testserver &
          for i in $(seq 1 10); do
            curl -sf http://localhost:8081/system/health >/dev/null && break
            sleep 1
          done

      - name: Contract tests
        uses: schemathesis/action@v3
        with:
          schema: spec/dist/openapi.bundled.yaml
          base-url: http://localhost:8081
          checks: all
          # chi router returns 405 without the RFC 9110 Allow header — not a spec issue.
          # negative_data_rejection sends schema-violating inputs and expects 4xx; Go's
          # strconv.ParseBool accepts "0"/"1" for boolean params so these false-positives.
          # chi v5 double-decodes path segments so bare % in path params causes 400;
          # exclude all path-param endpoints until the upstream issue is resolved.
          args: >-
            --exclude-checks unsupported_method
            --exclude-checks negative_data_rejection
            --exclude-path '.*\{'
