# Homelab API backend configuration.
# Copy this file to config.yaml and fill in your values.
# Values can reference environment variables: ${VAR_NAME}

# Authorization settings.
# Set enabled: true and configure dex.url when Dex is running as a sidecar.
auth:
  enabled: false
  scopes_enabled: false  # set true when IdP supports resource scopes (e.g. read:containers)
  issuer: http://localhost:8080/dex  # must match dex/config.yaml issuer exactly
  audience: homelab-api              # optional; omit or leave empty to skip audience validation

# Dex OIDC sidecar settings.
# dex.url is the internal address of the Dex container (Docker network DNS).
# The API proxies /dex/* requests to this address for external clients (e.g. homelab-cli).
# The API also fetches JWKS directly from this address (not via the proxy): {url}/dex/keys.
dex:
  url: http://dex:5556

backends:
  - name: nas-01
    type: synology
    host: 192.168.1.10:5001
    username: admin
    password: ${NAS01_PASS}
    # timezone: Europe/Warsaw  # optional; IANA name — defaults to server local TZ

  # Uncomment to add a second NAS:
  # - name: nas-02
  #   type: synology
  #   host: 192.168.1.11:5001
  #   username: admin
  #   password: ${NAS02_PASS}

  - name: unifi
    type: unifi
    host: 192.168.1.1
    username: admin
    password: ${UNIFI_PASS}

# Software update tracking configuration.
# All containers with a version tag are discovered automatically from running backends.
# ghcr.io/{owner}/{repo} images resolve automatically; use sources for everything else.
updates:
  # check_interval: 1h  # how often to refresh from upstream (default: 1h, e.g. 30m, 6h, 24h)
  sources:
    # Immich: monorepo — both server and ML images share the same GitHub release
    - image: ghcr.io/immich-app/immich-server
      source: immich-app/immich
    - image: ghcr.io/immich-app/immich-machine-learning
      source: immich-app/immich
    # Vaultwarden: Docker Hub image name differs from GitHub repo
    - image: vaultwarden/server
      source: dani-garcia/vaultwarden
    # UniFi: Docker Hub, repo name differs
    - image: jacobalberty/unifi
      source: jacobalberty/unifi-docker
    # Grafana stack: Docker Hub images
    - image: grafana/grafana
      source: grafana/grafana
    - image: grafana/loki
      source: grafana/loki
    - image: grafana/alloy
      source: grafana/alloy
    # Prometheus stack: Docker Hub images
    - image: prom/prometheus
      source: prometheus/prometheus
    - image: prom/node-exporter
      source: prometheus/node_exporter
    # cAdvisor: GCR image
    - image: gcr.io/cadvisor/cadvisor
      source: google/cadvisor
